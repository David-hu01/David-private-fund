<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Blog - 大卫私人基金</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="shortcut icon" href="favicon-96x96.png" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fef9e7 0%, #fef5c7 50%, #fff9e6 100%);
            min-height: 100vh;
        }

        .blog-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .blog-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: white;
            border-left: 4px solid transparent;
        }

        .blog-card:hover {
            transform: translateX(8px) translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border-left-color: #0891b2;
        }

        .blog-card.featured {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            color: white;
        }

        .blog-card.featured:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px rgba(8, 145, 178, 0.3);
        }

        .blog-card.featured .blog-date,
        .blog-card.featured .blog-excerpt {
            color: rgba(255, 255, 255, 0.9);
        }

        .blog-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-featured {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .badge-analysis {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .badge-market {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .badge-strategy {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .new-post-btn {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(8, 145, 178, 0.3);
        }

        .new-post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(8, 145, 178, 0.4);
        }

        .search-box {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }

        .search-box:focus {
            border-color: #0891b2;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
            outline: none;
        }

        .category-filter {
            display: inline-block;
            padding: 8px 16px;
            margin: 4px;
            border-radius: 25px;
            background: white;
            color: #0891b2;
            border: 2px solid #0891b2;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .category-filter:hover {
            background: #0891b2;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.25);
        }

        .category-filter.active {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            color: white;
            border-color: transparent;
        }

        .blog-header {
            background: linear-gradient(135deg, rgba(8, 145, 178, 0.08) 0%, rgba(6, 182, 212, 0.08) 100%);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin: 0 auto 1rem;
            opacity: 0.3;
        }

        .quick-post-container {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(8, 145, 178, 0.1);
        }

        .quick-post-textarea {
            width: 100%;
            border: none;
            resize: none;
            font-size: 1.1rem;
            color: #374151;
            padding: 0.5rem;
            min-height: 100px;
            outline: none;
        }

        .quick-post-textarea::placeholder {
            color: #9ca3af;
        }

        .post-action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
            margin-top: 0.5rem;
        }

        .btn-post {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            color: white;
            font-weight: 700;
            padding: 0.6rem 2rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.2);
        }

        .btn-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(8, 145, 178, 0.3);
            filter: brightness(1.1);
        }

        .btn-post:active {
            transform: translateY(0);
        }

        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
    <script src="blog-loader.js" defer></script>
</head>

<body class="flex flex-col min-h-screen">

    <!-- 顶部导航栏 -->
    <nav class="fixed top-0 left-0 right-0 bg-white shadow-md z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row items-center justify-between py-3 sm:h-16 sm:py-0">
                <a href="index.html"
                    class="flex items-center space-x-3 mb-3 sm:mb-0 w-full sm:w-auto justify-center sm:justify-start">
                    <img src="logo.png" alt="Logo" class="h-8 sm:h-10 w-auto" />
                    <span class="font-bold text-xl text-gray-900 whitespace-nowrap">大卫私人基金</span>
                </a>
                <div
                    class="flex overflow-x-auto w-full sm:w-auto space-x-2 sm:space-x-6 items-center justify-start sm:justify-center pb-2 sm:pb-0 hide-scrollbar">
                    <a href="index.html" class="flex-none font-medium group">
                        <span
                            class="block text-center text-xs sm:text-sm px-3 py-1.5 sm:px-4 sm:py-2 rounded whitespace-nowrap bg-blue-600 text-white transition-colors duration-150 group-hover:bg-blue-700">基金概览</span>
                    </a>
                    <a href="investment_framework_report.html" class="flex-none font-medium group">
                        <span
                            class="block text-center text-xs sm:text-sm px-3 py-1.5 sm:px-4 sm:py-2 rounded whitespace-nowrap bg-green-500 text-white transition-colors duration-150 group-hover:bg-green-600">未来动力新基金</span>
                    </a>
                    <a href="report.html" class="flex-none font-medium group">
                        <span
                            class="block text-center text-xs sm:text-sm px-3 py-1.5 sm:px-4 sm:py-2 rounded whitespace-nowrap bg-orange-500 text-white transition-colors duration-150 group-hover:bg-orange-600">内部参考</span>
                    </a>
                    <a href="blog.html" class="flex-none font-medium group">
                        <span
                            class="block text-center text-xs sm:text-sm px-4 py-1.5 sm:px-4 sm:py-2 rounded whitespace-nowrap bg-teal-500 text-white transition-colors duration-150 group-hover:bg-teal-600">Blog</span>
                    </a>
                    <a href="fed_full_market_mechanism_war_inflation.html" class="flex-none font-medium group">
                        <span
                            class="block text-center text-xs sm:text-sm px-4 py-1.5 sm:px-4 sm:py-2 rounded whitespace-nowrap bg-purple-500 text-white transition-colors duration-150 group-hover:bg-purple-600">宏观机制</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面主内容 -->
    <main class="flex-grow pt-24 pb-12 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- 博客头部 -->
        <div class="blog-header">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-gray-900 mb-3">
                📝 Blog
            </h1>
            <p class="text-lg text-gray-600 mb-6">
                记录投资思考、市场洞察与策略分析
            </p>

            <!-- 搜索框 -->
            <div class="flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
                <input type="text" id="searchInput" placeholder="🔍 搜索文章内容..."
                    class="search-box flex-1 px-4 py-3 rounded-lg text-gray-700" />
            </div>
        </div>





        <!-- 博客文章列表 -->
        <div id="blogList" class="space-y-6">
            <!-- 文章将从 blog-articles.json 动态加载 -->
            <div class="text-center py-12">
                <p class="text-gray-500">正在加载文章...</p>
            </div>
        </div>

        <!-- 空状态（当搜索无结果时显示） -->
        <div id="emptyState" class="empty-state hidden">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-xl font-semibold mb-2">暂无相关文章</h3>
            <p>尝试使用其他关键词搜索，或浏览所有分类</p>
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-gray-200 text-center py-6 text-gray-500 text-sm">
        投资有风险，入市需谨慎。<br />© 2025 大卫私人基金. All rights reserved.
    </footer>

    <script>
        // 分类筛选功能
        const categoryFilters = document.querySelectorAll('.category-filter');
        const blogCards = document.querySelectorAll('.blog-card');

        categoryFilters.forEach(filter => {
            filter.addEventListener('click', () => {
                // 更新激活状态
                categoryFilters.forEach(f => f.classList.remove('active'));
                filter.classList.add('active');

                const category = filter.dataset.category;

                // 筛选文章
                blogCards.forEach(card => {
                    if (category === 'all') {
                        card.style.display = 'block';
                    } else if (category === 'featured' && card.classList.contains('featured')) {
                        card.style.display = 'block';
                    } else if (category !== 'featured' && !card.classList.contains('featured')) {
                        const badge = card.querySelector('.blog-badge');
                        if (badge && badge.classList.contains(`badge-${category}`)) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    } else {
                        card.style.display = 'none';
                    }
                });

                checkEmptyState();
            });
        });

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();

            blogCards.forEach(card => {
                const title = card.querySelector('h2').textContent.toLowerCase();
                const excerpt = card.querySelector('.blog-excerpt').textContent.toLowerCase();

                if (title.includes(searchTerm) || excerpt.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });

            checkEmptyState();
        });

        // 检查是否显示空状态
        function checkEmptyState() {
            const visibleCards = Array.from(blogCards).filter(card => card.style.display !== 'none');
            const emptyState = document.getElementById('emptyState');
            const blogList = document.getElementById('blogList');

            if (visibleCards.length === 0) {
                blogList.style.display = 'none';
                emptyState.classList.remove('hidden');
            } else {
                blogList.style.display = 'block';
                emptyState.classList.add('hidden');
            }
        }



        // 文章卡片点击 (由 blog-loader.js 处理)
    </script>

</body>

</html>
